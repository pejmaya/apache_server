<VirtualHost *:80>
    ServerName pelican.pejmaya.dev

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>


<VirtualHost *:443>

    ServerName pelican.pejmaya.pl

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/certs/fullchain.pem
    SSLCertificateKeyFile /usr/local/apache2/conf/certs/privkey.pem

    ProxyPreserveHost On

    ProxyPass / http://pelican_app:8080/
    ProxyPassReverse / http://pelican_app:8080/

</VirtualHost>